services:
  notecast-bridge:
    image: ghcr.io/laurentftech/notecast:latest
    restart: unless-stopped
    container_name: notecast-bridge
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - ./public:/public
      - ./data:/data
      - ./auth:/root/.notebooklm
      - ./config:/config:ro
    environment:
      - TRANSFORMER_CONFIG

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./public:/srv
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - CADDY_DOMAIN
    depends_on:
      - notecast-bridge

volumes:
  caddy_data:
  caddy_config:
