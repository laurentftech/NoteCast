<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NoteCast</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --surface2: #f0f0f2;
      --border: #d1d1d6;
      --text: #1d1d1f;
      --text2: #6e6e73;
      --accent: #6c35de;
      --accent-dim: #6c35de18;
      --playing-bg: #6c35de12;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
      --radius: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d0d0f;
        --surface: #1a1a1f;
        --surface2: #222228;
        --border: #2e2e36;
        --text: #f0f0f2;
        --text2: #8e8e9a;
        --accent: #a78bfa;
        --accent-dim: #a78bfa18;
        --playing-bg: #a78bfa10;
        --shadow: 0 1px 3px rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.2);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding-bottom: 100px;
    }

    /* ── Header ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 24px 20px 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .cover {
      width: 72px; height: 72px;
      border-radius: 12px;
      object-fit: cover;
      background: var(--surface2);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      overflow: hidden;
    }
    .cover img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; }
    .header-info { flex: 1; min-width: 0; }
    .header-info h1 { font-size: 20px; font-weight: 700; letter-spacing: -.3px; }
    .header-info .subtitle { font-size: 13px; color: var(--text2); margin-top: 2px; }
    .header-actions { display: flex; gap: 8px; align-items: center; }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 13px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 13px; font-weight: 500;
      cursor: pointer; text-decoration: none;
      transition: background .15s, border-color .15s;
      white-space: nowrap;
    }
    .btn:hover { background: var(--border); }
    .btn-accent {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .btn-accent:hover { opacity: .88; background: var(--accent); }
    .btn-icon {
      padding: 7px 10px;
    }

    /* ── Episodes ── */
    .section { max-width: 760px; margin: 0 auto; padding: 20px 16px 0; }
    .section-title {
      font-size: 12px; font-weight: 600; letter-spacing: .06em;
      text-transform: uppercase; color: var(--text2);
      margin-bottom: 10px; padding: 0 4px;
    }

    .episodes { display: flex; flex-direction: column; gap: 2px; }

    .episode {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 14px;
      border-radius: 10px;
      cursor: pointer;
      transition: background .12s;
      border: 1px solid transparent;
    }
    .episode:hover { background: var(--surface); border-color: var(--border); }
    .episode.playing {
      background: var(--playing-bg);
      border-color: var(--accent-dim);
    }
    .play-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: none; cursor: pointer; flex-shrink: 0;
      background: var(--surface2);
      color: var(--text);
      display: flex; align-items: center; justify-content: center;
      transition: background .12s, transform .1s;
    }
    .episode:hover .play-btn,
    .episode.playing .play-btn { background: var(--accent); color: #fff; }
    .play-btn:active { transform: scale(.93); }
    .play-btn svg { width: 16px; height: 16px; }

    .ep-info { flex: 1; min-width: 0; }
    .ep-title {
      font-size: 14px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .episode.playing .ep-title { color: var(--accent); }
    .ep-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }

    .ep-duration { font-size: 12px; color: var(--text2); flex-shrink: 0; }

    /* ── Empty / Loading ── */
    .empty {
      text-align: center; padding: 60px 20px;
      color: var(--text2); font-size: 15px;
    }
    .empty .icon { font-size: 40px; margin-bottom: 12px; }

    /* ── Player ── */
    .player {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 20px 16px;
      display: none;
      flex-direction: column; gap: 8px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 20;
    }
    .player.visible { display: flex; }
    .player-top { display: flex; align-items: center; gap: 12px; }
    .player-title {
      flex: 1; min-width: 0;
      font-size: 13px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: var(--text);
    }
    .player-controls { display: flex; align-items: center; gap: 4px; }
    .ctrl-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: none; background: none; cursor: pointer;
      color: var(--text); display: flex; align-items: center; justify-content: center;
      transition: background .12s;
    }
    .ctrl-btn:hover { background: var(--surface2); }
    .ctrl-btn.play-pause {
      width: 40px; height: 40px;
      background: var(--accent); color: #fff;
    }
    .ctrl-btn.play-pause:hover { opacity: .88; }
    .ctrl-btn svg { width: 18px; height: 18px; }
    .ctrl-btn.play-pause svg { width: 20px; height: 20px; }

    .player-progress { display: flex; align-items: center; gap: 10px; }
    .time { font-size: 11px; color: var(--text2); flex-shrink: 0; font-variant-numeric: tabular-nums; }
    .progress-bar {
      flex: 1; height: 4px; border-radius: 2px;
      background: var(--border); cursor: pointer; position: relative;
    }
    .progress-fill {
      height: 100%; border-radius: 2px;
      background: var(--accent); width: 0%;
      transition: width .25s linear;
      pointer-events: none;
    }

    /* ── Admin Modal ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 30; display: none;
      align-items: flex-end; justify-content: center;
      padding: 16px;
    }
    .overlay.open { display: flex; }
    @media (min-width: 500px) {
      .overlay { align-items: center; }
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%; max-width: 420px;
      padding: 20px;
      box-shadow: var(--shadow);
    }
    .modal-header {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .modal-header h2 { font-size: 16px; font-weight: 600; }
    .close-btn {
      width: 28px; height: 28px; border-radius: 50%;
      border: none; background: var(--surface2);
      cursor: pointer; color: var(--text2);
      display: flex; align-items: center; justify-content: center;
    }
    .close-btn:hover { background: var(--border); }

    .stat-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; margin-bottom: 20px;
    }
    .stat {
      background: var(--surface2);
      border-radius: 10px; padding: 12px 14px;
    }
    .stat-value { font-size: 22px; font-weight: 700; }
    .stat-label { font-size: 12px; color: var(--text2); margin-top: 2px; }

    .section-label {
      font-size: 11px; font-weight: 600; letter-spacing: .06em;
      text-transform: uppercase; color: var(--text2);
      margin-bottom: 10px;
    }

    .upload-area {
      border: 1px dashed var(--border);
      border-radius: 10px; padding: 16px;
      text-align: center;
    }
    .upload-area p { font-size: 13px; color: var(--text2); margin-bottom: 10px; }
    .upload-area input[type=file] { display: none; }
    .upload-result {
      margin-top: 8px; font-size: 13px; display: none;
    }
    .upload-result.ok { color: #22c55e; }
    .upload-result.err { color: #ef4444; }

    .rss-row {
      display: flex; gap: 8px; align-items: center;
      background: var(--surface2);
      border-radius: 8px; padding: 10px 12px;
      margin-top: 16px;
    }
    .rss-url { font-size: 12px; color: var(--text2); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto;
    }
  </style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="cover" id="cover">🎙</div>
  <div class="header-info">
    <h1>NoteCast</h1>
    <div class="subtitle" id="subtitle">Loading…</div>
  </div>
  <div class="header-actions">
    <button class="btn btn-icon" id="adminBtn" title="Admin" aria-label="Admin">
      <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/></svg>
    </button>
  </div>
</header>

<!-- Episode list -->
<div class="section">
  <div class="section-title">Episodes</div>
  <div class="episodes" id="episodes">
    <div class="empty"><div class="spinner"></div></div>
  </div>
</div>

<!-- Player -->
<div class="player" id="player">
  <div class="player-top">
    <div class="player-title" id="playerTitle">—</div>
    <div class="player-controls">
      <button class="ctrl-btn" id="skipBack" title="−15s">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.45"/><text x="9" y="15" font-size="6" fill="currentColor" stroke="none" font-family="sans-serif">15</text></svg>
      </button>
      <button class="ctrl-btn play-pause" id="playPause">
        <svg id="iconPlay" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg id="iconPause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
      <button class="ctrl-btn" id="skipFwd" title="+30s">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-3.45"/><text x="9" y="15" font-size="6" fill="currentColor" stroke="none" font-family="sans-serif">30</text></svg>
      </button>
    </div>
  </div>
  <div class="player-progress">
    <span class="time" id="timeElapsed">0:00</span>
    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <span class="time" id="timeDuration">0:00</span>
  </div>
</div>

<!-- Admin modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-header">
      <h2>Admin</h2>
      <button class="close-btn" id="closeAdmin">
        <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
      </button>
    </div>

    <div class="stat-grid">
      <div class="stat">
        <div class="stat-value" id="statEpisodes">—</div>
        <div class="stat-label">Episodes</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statNextPoll">—</div>
        <div class="stat-label">Next poll</div>
      </div>
      <div class="stat" style="grid-column:span 2">
        <div class="stat-value" style="font-size:14px;font-weight:500" id="statUpdated">—</div>
        <div class="stat-label">Last updated</div>
      </div>
    </div>

    <div class="section-label">RSS Feed</div>
    <div class="rss-row">
      <span class="rss-url" id="rssUrl">—</span>
      <button class="btn" id="copyRss">Copy</button>
    </div>

    <div style="margin-top:20px">
      <div class="section-label">Re-authenticate</div>
      <div class="upload-area">
        <p>Upload <code>storage_state.json</code> from your Mac</p>
        <label class="btn" style="cursor:pointer">
          Choose File
          <input type="file" id="authFile" accept=".json,application/json">
        </label>
        <div style="margin-top:8px" id="authFilename" style="font-size:12px;color:var(--text2)"></div>
        <div class="upload-result" id="uploadResult"></div>
      </div>
      <button class="btn btn-accent" id="uploadBtn" style="width:100%;margin-top:10px;justify-content:center">
        Upload Credentials
      </button>
    </div>
  </div>
</div>

<audio id="audio"></audio>

<script>
  const audio = document.getElementById('audio');
  let currentId = null;
  let episodes = [];

  // ── Helpers ──────────────────────────────────────
  function fmt(s) {
    if (!isFinite(s)) return '0:00';
    const m = Math.floor(s / 60), sec = Math.floor(s % 60);
    return `${m}:${sec.toString().padStart(2, '0')}`;
  }
  function relTime(iso) {
    if (!iso) return '—';
    const diff = Date.now() - new Date(iso).getTime();
    const m = Math.floor(diff / 60000);
    if (m < 1) return 'just now';
    if (m < 60) return `${m}m ago`;
    const h = Math.floor(m / 60);
    if (h < 24) return `${h}h ago`;
    return `${Math.floor(h / 24)}d ago`;
  }
  function fmtCountdown(s) {
    if (s <= 0) return 'soon';
    if (s < 60) return `${s}s`;
    return `${Math.floor(s / 60)}m`;
  }

  // ── Cover ─────────────────────────────────────────
  const coverEl = document.getElementById('cover');
  function tryLoadCover() {
    for (const ext of ['jpg', 'jpeg', 'png']) {
      const img = new Image();
      img.src = `/cover.${ext}`;
      img.onload = () => {
        coverEl.innerHTML = '';
        coverEl.appendChild(img);
      };
    }
  }
  tryLoadCover();

  // ── Episodes ─────────────────────────────────────
  async function loadEpisodes() {
    const list = document.getElementById('episodes');
    try {
      const res = await fetch('/api/episodes');
      episodes = await res.json();
      document.getElementById('subtitle').textContent =
        episodes.length === 1 ? '1 episode' : `${episodes.length} episodes`;

      if (!episodes.length) {
        list.innerHTML = '<div class="empty"><div class="icon">🎙</div>No episodes yet. NoteCast is polling your notebooks.</div>';
        return;
      }

      list.innerHTML = episodes.map(ep => `
        <div class="episode" id="ep-${ep.id}" data-id="${ep.id}" data-url="${ep.url}">
          <button class="play-btn" aria-label="Play">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          </button>
          <div class="ep-info">
            <div class="ep-title">${ep.title}</div>
            <div class="ep-meta">${[ep.notebook, relTime(ep.created_at)].filter(Boolean).join(' · ')}</div>
          </div>
        </div>
      `).join('');

      list.querySelectorAll('.episode').forEach(el => {
        el.addEventListener('click', () => playEpisode(el.dataset.id, el.dataset.url, el.querySelector('.ep-title').textContent));
      });
    } catch {
      list.innerHTML = '<div class="empty">Could not load episodes.</div>';
    }
  }

  // ── Player ───────────────────────────────────────
  function playEpisode(id, url, title) {
    document.querySelectorAll('.episode').forEach(e => e.classList.remove('playing'));
    const el = document.getElementById(`ep-${id}`);
    if (el) el.classList.add('playing');

    if (currentId === id && !audio.paused) {
      audio.pause();
      setPlayIcon(false);
      return;
    }

    currentId = id;
    if (audio.src !== url) {
      audio.src = url;
      audio.load();
    }
    audio.play();
    document.getElementById('playerTitle').textContent = title;
    document.getElementById('player').classList.add('visible');
    setPlayIcon(true);
  }

  function setPlayIcon(playing) {
    document.getElementById('iconPlay').style.display = playing ? 'none' : '';
    document.getElementById('iconPause').style.display = playing ? '' : 'none';
  }

  document.getElementById('playPause').addEventListener('click', () => {
    if (audio.paused) { audio.play(); setPlayIcon(true); }
    else { audio.pause(); setPlayIcon(false); }
  });
  document.getElementById('skipBack').addEventListener('click', () => audio.currentTime = Math.max(0, audio.currentTime - 15));
  document.getElementById('skipFwd').addEventListener('click', () => audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 30));

  audio.addEventListener('timeupdate', () => {
    const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('timeElapsed').textContent = fmt(audio.currentTime);
    document.getElementById('timeDuration').textContent = fmt(audio.duration);
  });
  audio.addEventListener('ended', () => {
    setPlayIcon(false);
    document.querySelectorAll('.episode').forEach(e => e.classList.remove('playing'));
    const idx = episodes.findIndex(e => e.id === currentId);
    if (idx >= 0 && idx < episodes.length - 1) {
      const next = episodes[idx + 1];
      playEpisode(next.id, next.url, next.title);
    }
  });

  document.getElementById('progressBar').addEventListener('click', e => {
    if (!audio.duration) return;
    const r = e.currentTarget.getBoundingClientRect();
    audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
  });

  // ── Admin ─────────────────────────────────────────
  const overlay = document.getElementById('overlay');
  document.getElementById('adminBtn').addEventListener('click', () => {
    overlay.classList.add('open');
    loadStatus();
  });
  document.getElementById('closeAdmin').addEventListener('click', () => overlay.classList.remove('open'));
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });

  async function loadStatus() {
    try {
      const s = await fetch('/api/status').then(r => r.json());
      document.getElementById('statEpisodes').textContent = s.episodes;
      document.getElementById('statNextPoll').textContent = fmtCountdown(s.next_poll_in);
      document.getElementById('statUpdated').textContent = s.last_updated ? relTime(s.last_updated) : '—';
    } catch {}
  }

  const feedUrl = `${location.origin}/feed.xml`;
  document.getElementById('rssUrl').textContent = feedUrl;
  document.getElementById('copyRss').addEventListener('click', () => {
    navigator.clipboard.writeText(feedUrl).then(() => {
      document.getElementById('copyRss').textContent = 'Copied!';
      setTimeout(() => document.getElementById('copyRss').textContent = 'Copy', 1500);
    });
  });

  const authFile = document.getElementById('authFile');
  authFile.addEventListener('change', () => {
    document.getElementById('authFilename').textContent = authFile.files[0]?.name || '';
  });

  document.getElementById('uploadBtn').addEventListener('click', async () => {
    const file = authFile.files[0];
    const result = document.getElementById('uploadResult');
    if (!file) { result.textContent = 'Choose a file first.'; result.className = 'upload-result err'; result.style.display = 'block'; return; }
    const fd = new FormData();
    fd.append('file', file);
    try {
      const res = await fetch('/auth/upload', { method: 'POST', body: fd });
      const json = await res.json();
      result.textContent = json.ok ? '✓ Credentials updated' : json.error;
      result.className = 'upload-result ' + (json.ok ? 'ok' : 'err');
    } catch {
      result.textContent = 'Upload failed.';
      result.className = 'upload-result err';
    }
    result.style.display = 'block';
  });

  // ── Init ──────────────────────────────────────────
  loadEpisodes();
  setInterval(loadEpisodes, 30000);
</script>
</body>
</html>
